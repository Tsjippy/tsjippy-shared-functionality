name: On release
on:
    release:
        types: [released]
jobs:
  resources:
    name: Update wp plugin version
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v6

        - uses: actions/setup-node@v6

        - name: Install dependencies
          run: sudo pip3 install PyGithub

        - name: Update version
          env: 
            RELEASE_ID: ${{ github.event.release.id }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            RELEASE_TAG: ${{ github.event.release.name }}
          run: python ./.github/workflows/update_version.py

        - name: Update wp plugin version
          uses: test-room-7/action-update-file@v2
          env: 
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
              file-path: |
                tsjippy-shared-functionality.php
                CHANGELOG.md
              commit-msg: Update wp plugin version
              github-token: ${{ secrets.GITHUB_TOKEN }}
              
        - name: Zip Folder
          run: zip -r ${{ github.event.repository.name }}.zip . -x ".git/*" ".github/*" "phpcs.xml" "composer.json" "composer.lock" ".gitignore" "signalbot.db" "SignalBot.py" "CHANGELOG.md" "README.md" "*.code-workspace" "*.cmd" ".vscode" "test.php"

        - name: Release
          uses: softprops/action-gh-release@v3
          if: startsWith(github.ref, 'refs/tags/')
          with:
            files: ${{ github.event.repository.name }}.zip
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
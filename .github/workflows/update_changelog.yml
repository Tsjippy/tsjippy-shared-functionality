name: Update Changelog
on: [push]
jobs:
  resources:
    name: Update changelog
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v6

        - uses: actions/setup-node@v6

        - name: Install dependencies
          run: sudo pip3 install PyGithub

        - name: Get the python File
          uses: actions/checkout@v6
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            repository: tsjippy/shared-functionality
            path: scripts
            sparse-checkout: |
              .github/workflows/update_changelog.py
            sparse-checkout-cone-mode: false

        - name: Update version
          env: 
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            PLUGIN: ${{ github.event.repository.name }}
          run: python scripts/.github/workflows/update_changelog.py "${{ github.event.commits[0].message }}"

        - name: Commit file
          uses: test-room-7/action-update-file@v2
          with:
              file-path: CHANGELOG.md
              commit-msg: Update changelog with commit message
              github-token: ${{ secrets.GITHUB_TOKEN }}